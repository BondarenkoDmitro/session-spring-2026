<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>📋 Мой Ежедневный План Обучения</title>
</head>
<body>
  <div class="container">
    <header class="header">
      <h1>📋 ЕЖЕДНЕВНЫЙ ПЛАН ОБУЧЕНИЯ</h1>
      <p class="period">07.04.2026 - 04.06.2026 | 8 недель | 4-5 часов в день</p>
      <div class="stats">
        <div class="stat-item" id="totalTasksItem" title="Нажмите для просмотра всех задач">
          <span class="stat-label">Всего задач:</span>
          <span class="stat-value" id="totalTasks">0</span>
        </div>
        <div class="stat-item" id="completedTasksItem" title="Нажмите для просмотра выполненных задач">
          <span class="stat-label">✅ Выполнено:</span>
          <span class="stat-value" id="completedTasks">0</span>
        </div>
        <div class="stat-item" id="inProgressTasksItem" title="Нажмите для просмотра задач в работе">
          <span class="stat-label">⏳ В работе:</span>
          <span class="stat-value" id="inProgressTasks">0</span>
        </div>
        <div class="stat-item" id="notStartedTasksItem" title="Нажмите для просмотра неначатых задач">
          <span class="stat-label">❌ Не начато:</span>
          <span class="stat-value" id="notStartedTasks">0</span>
        </div>
      </div>
    </header>

    <main class="main-content" id="mainContent">
      <section class="days-section">
        <h2>📅 Дни</h2>
        <div id="daysContainer" class="days-container">
        </div>
      </section>

      <section class="next-week-section">
        <button id="nextWeekBtn" class="btn btn-next-week">➡️ Перейти на след. неделю</button>
      </section>

    </main>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
