<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>📋 Мой Ежедневный План Обучения</title>
  <link rel="stylesheet" href="/src/style.css">
</head>
<body>
  <div class="container">
    <header class="header">
      <h1>📋 ЕЖЕДНЕВНЫЙ ПЛАН ОБУЧЕНИЯ</h1>
      <p class="period">07.04.2026 - 04.06.2026 | 8 недель | 4-5 часов в день</p>
      <div class="stats">
        <div class="stat-item" title="Общее количество задач">
          <span class="stat-label">Всего задач:</span>
          <span class="stat-value" id="totalTasks">0</span>
        </div>
        <div class="stat-item" title="Задачи выполнены">
          <span class="stat-label">✅ Выполнено:</span>
          <span class="stat-value" id="completedTasks">0</span>
        </div>
        <div class="stat-item" title="Задачи в работе">
          <span class="stat-label">⏳ В работе:</span>
          <span class="stat-value" id="inProgressTasks">0</span>
        </div>
        <div class="stat-item" title="Задачи не начаты">
          <span class="stat-label">❌ Не начато:</span>
          <span class="stat-value" id="notStartedTasks">0</span>
        </div>
      </div>
    </header>

    <main class="main-content">
      <section class="days-section">
        <h2>📅 Дни</h2>
        <div id="daysContainer" class="days-container">
        </div>
      </section>

      <section class="add-day-section">
        <h2>➕ Добавить новый день</h2>
        <div class="add-day-form">
          <div class="form-group">
            <label for="dayDate">Дата (ГГГГ-ММ-ДД):</label>
            <input type="date" id="dayDate" value="2026-04-07">
          </div>
          <div class="form-group">
            <label for="dayName">Название дня:</label>
            <input type="text" id="dayName" placeholder="Например: ВТ 07.04 (4-5 ч)" value="ВТ 07.04 (4-5 ч)">
          </div>
          <button id="addDayBtn" class="btn btn-primary">+ Добавить день</button>
        </div>
      </section>
    </main>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
